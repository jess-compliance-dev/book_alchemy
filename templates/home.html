<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Library Home</title>
  </head>
  <body>

    <h1>Library Home</h1>

    {% for book in books %}
      <div>
        <!-- Cover-Bild  -->
        <img src="https://via.placeholder.com/50x75" alt="Cover"><br>

        <!-- Titel und Autor -->
        <h3>{{ book.title }}</h3>
        <p>by {{ book.author.name if book.author else "Unknown" }}</p>
        <p>ISBN: {{ book.isbn }}</p>
        <p>Publication Year: {{ book.publication_year }}</p>
      </div>
      <hr>
    {% endfor %}

  </body>
</html>
