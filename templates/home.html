<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Library Home</title>
  </head>
  <body>

    <h1>Library Home</h1>

    <!-- Success message -->
    {% if message %}
      <p style="color: green;">{{ message }}</p>
    {% endif %}

    <!-- Search Field -->
    <form method="get" action="{{ url_for('home') }}">
      <input type="text" name="keyword" placeholder="Search by title or author" value="{{ keyword or '' }}">
      <button type="submit">Search</button>
    </form>
    <hr>

    <!-- Sort-Dropdown -->
    <form method="get" action="{{ url_for('home') }}">
      <label for="sort">Sort books by:</label>
      <select name="sort" id="sort" onchange="this.form.submit()">
        <option value="" {% if not request.args.get('sort') %}selected{% endif %}>Original</option>
        <option value="title" {% if request.args.get('sort') == 'title' %}selected{% endif %}>Title</option>
        <option value="author" {% if request.args.get('sort') == 'author' %}selected{% endif %}>Author</option>
      </select>
    </form>
    <hr>

    {% for book in books %}
      <div>
        <!-- Title and Author -->
        <h3>{{ book.title }}</h3>
        <p>by {{ book.author.name if book.author else "Unknown" }}</p>
        <p>ISBN: {{ book.isbn }}</p>
        <p>Publication Year: {{ book.publication_year }}</p>

        <!-- Delete Book button -->
        <form method="post" action="{{ url_for('delete_book', book_id=book.book_id) }}" style="display:inline;">
          <button type="submit">Delete Book</button>
        </form>
      </div>
      <hr>
    {% endfor %}

  </body>
</html>
